<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>ESQUADЯO — Plugin Lápis Raro</title>
  <link rel="stylesheet" href="styles.css">
  <script src="js/CSInterface.js"></script>
</head>
<body>

  <div class="panel-container">
    
    <!-- Header -->
    <div class="panel-header">
      <div class="brand-logo">
        <span class="panel-title">ESQUADЯO</span>
      </div>
      <span class="badge-lr">LÁPIS RAЯO</span>
    </div>

    <div class="panel-body">
      
      <!-- 1. Plataforma (Ordem Alfabetica) -->
      <div class="form-group">
        <label for="platformSelect">PLATAFORMA</label>
        <select id="platformSelect">
          <option value="facebook">Facebook</option>
          <option value="instagram" selected>Instagram</option>
          <option value="linkedin">LinkedIn</option>
          <option value="tiktok">TikTok</option>
          <option value="whatsapp">WhatsApp</option>
          <option value="twitter">X (Twitter)</option>
          <option value="youtube">YouTube</option>
        </select>
      </div>

      <!-- 2. Formato de Mídia -->
      <div class="form-group">
        <label for="formatSelect">FORMATO DE MÍDIA</label>
        <select id="formatSelect">
          <!-- preenchido dinamicamente via JS -->
        </select>
      </div>

      <!-- 3. Quantidade de Pranchetas -->
      <div class="form-group">
        <label for="qtdInput">QUANTIDADE DE PRANCHETAS</label>
        <div class="stepper-container">
          <button type="button" class="stepper-btn" id="btnMinus">−</button>
          <input type="number" id="qtdInput" class="stepper-input" value="1" min="1" max="20">
          <button type="button" class="stepper-btn" id="btnPlus">+</button>
        </div>
      </div>

      <!-- Card de Preview -->
      <div class="preview-card">
        <div class="preview-stage">
          <div id="canvasPreview" class="canvas-preview">
            <div id="safeOverlay" class="guide-overlay"></div>
            <div id="noInfoBox" class="guide-no-info"></div>
            <div id="cropOverlay" class="guide-crop-overlay"></div>
          </div>
        </div>

        <div class="preview-footer">
          <span id="dimText" class="dim-badge">320 × 320 px</span>
          <span id="cropNoteText" class="crop-note" style="display:none;">(Crop Feed na 1ª prancheta)</span>

          <div class="legend-row">
            <div class="legend-item" id="legendSafeItem"><div class="dot dot-safe"></div><span>Safe Zone</span></div>
            <div class="legend-item" id="legendCropItem"><div class="dot dot-crop"></div><span>Linhas de Corte</span></div>
          </div>
        </div>
      </div>

      <!-- Ações -->
      <div class="button-group">
        <button class="btn-primary" id="btnCreate">
          <span id="btnActionLabel">Criar Prancheta</span>
        </button>
        <button class="btn-secondary" id="btnGuidesOnly">
          Aplicar Apenas Guias
        </button>
      </div>

      <div id="toast" class="toast-msg">
        ✅ Ação realizada com sucesso!
      </div>

    </div>

    <div class="panel-footer">
      BRAND INTELLIGENCE • 2026
    </div>

  </div>

  <script src="index.js"></script>
</body>
</html>
